<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Stack Sphere</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060810;
      --surface: #0d1117;
      --glow: #00f5ff;
      --glow2: #7c3aed;
      --text: #e2e8f0;
      --muted: #64748b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 50%, rgba(0,245,255,0.04) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 20% 80%, rgba(124,58,237,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: var(--glow);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      opacity: 0.7;
    }

    h2 {
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 3rem;
      background: linear-gradient(135deg, #fff 30%, var(--glow) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    .sphere-container {
      position: relative;
      width: 520px;
      height: 520px;
      perspective: 900px;
    }

    .sphere {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      animation: rotateSphere 22s linear infinite;
    }

    .sphere:hover {
      animation-play-state: paused;
    }

    @keyframes rotateSphere {
      0%   { transform: rotateY(0deg)   rotateX(15deg); }
      100% { transform: rotateY(360deg) rotateX(15deg); }
    }

    .tech-tag {
      position: absolute;
      top: 50%; left: 50%;
      transform-style: preserve-3d;
      transform-origin: 0 0;
    }

    .tech-tag span {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.04em;
      white-space: nowrap;
      cursor: default;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(13,17,23,0.85);
      backdrop-filter: blur(8px);
      color: #fff;
      transition: transform 0.2s, box-shadow 0.2s;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 0 transparent;
    }

    .tech-tag span:hover {
      transform: translate(-50%, -50%) scale(1.15);
      box-shadow: 0 0 18px 2px var(--glow-color, var(--glow));
      border-color: var(--glow-color, var(--glow));
      z-index: 10;
    }

    .tech-tag span .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--glow-color, var(--glow));
      box-shadow: 0 0 6px var(--glow-color, var(--glow));
      flex-shrink: 0;
    }

    /* Glow ring behind sphere */
    .ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotateX(20deg);
      width: 420px; height: 420px;
      border-radius: 50%;
      border: 1px solid rgba(0,245,255,0.12);
      box-shadow: 0 0 40px rgba(0,245,255,0.07), inset 0 0 40px rgba(0,245,255,0.04);
      pointer-events: none;
    }
    .ring2 {
      width: 340px; height: 340px;
      border-color: rgba(124,58,237,0.1);
      box-shadow: 0 0 30px rgba(124,58,237,0.06);
      transform: translate(-50%, -50%) rotateX(75deg) rotateZ(40deg);
    }
  </style>
</head>
<body>

<p class="section-label">// technologies</p>
<h2>Tech Stack</h2>

<div class="sphere-container">
  <div class="ring"></div>
  <div class="ring ring2"></div>
  <div class="sphere" id="sphere"></div>
</div>

<script>
  const techs = [
    { name: "React",       color: "#61dafb" },
    { name: "TypeScript",  color: "#3178c6" },
    { name: "Node.js",     color: "#68a063" },
    { name: "Python",      color: "#ffd43b" },
    { name: "GraphQL",     color: "#e535ab" },
    { name: "Docker",      color: "#2496ed" },
    { name: "PostgreSQL",  color: "#336791" },
    { name: "Redis",       color: "#ff4438" },
    { name: "Next.js",     color: "#ffffff" },
    { name: "Tailwind",    color: "#38bdf8" },
    { name: "AWS",         color: "#ff9900" },
    { name: "Git",         color: "#f05032" },
    { name: "MongoDB",     color: "#47a248" },
    { name: "Figma",       color: "#a259ff" },
    { name: "Linux",       color: "#fcc624" },
    { name: "REST API",    color: "#00f5ff" },
    { name: "Vue.js",      color: "#42d392" },
    { name: "Kubernetes",  color: "#326ce5" },
  ];

  const sphere = document.getElementById('sphere');
  const R = 200; // radius in px
  const N = techs.length;

  // Fibonacci sphere distribution
  const goldenAngle = Math.PI * (3 - Math.sqrt(5));

  techs.forEach((tech, i) => {
    const y = 1 - (i / (N - 1)) * 2;        // -1 to 1
    const radius = Math.sqrt(1 - y * y);
    const theta = goldenAngle * i;

    const x = Math.cos(theta) * radius;
    const z = Math.sin(theta) * radius;

    // 3D → CSS 3D transform
    const tag = document.createElement('div');
    tag.className = 'tech-tag';
    tag.innerHTML = `<span style="--glow-color:${tech.color}">
    <span class="dot"></span>${tech.name}
  </span>`;

    // Position on sphere surface
    tag.style.transform = `translate3d(${x * R}px, ${-y * R}px, ${z * R}px)`;

    sphere.appendChild(tag);
  });
</script>
</body>
</html>
